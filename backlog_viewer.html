<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backlog — SETDIG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F8F9FB;
  --surface:   #FFFFFF;
  --border:    #E5E8ED;
  --border-2:  #D0D5DE;
  --text:      #1A1D23;
  --text-sub:  #5A6070;
  --text-muted:#9299A8;
  --selected:  #EEF3FD;
  --sel-bar:   #0078D4;
  --hover:     #F3F5F9;

  /* ADO bowtie colors */
  --c-epic:    #5C2D91;
  --c-feat:    #009CCC;
  --c-pbi:     #009CCC;
  --c-task:    #B08A00;
  --c-bug:     #CC293D;

  --c-epic-bg: #EDE7F6;
  --c-feat-bg: #E1F5FE;
  --c-pbi-bg:  #E1F5FE;
  --c-task-bg: #FFF8E1;
  --c-bug-bg:  #FDECEA;

  --indent: 20px;
  --row-h: 32px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 0;
  height: 48px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 20px;
}

.hdr-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-right: 20px;
  border-right: 1px solid var(--border);
  margin-right: 16px;
}

.hdr-brand-icon {
  width: 28px; height: 28px;
  background: #0078D4;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}

.hdr-brand-icon svg { width: 16px; height: 16px; }

.hdr-org {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}

.hdr-team {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.hdr-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sub);
}

.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.hdr-pill {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 10px;
}

/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── TREE ── */
.tree-panel {
  width: 50%;
  min-width: 320px;
  overflow-y: auto;
  background: #fff;
  border-right: 1px solid var(--border);
  padding: 8px 0 32px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}
.tree-panel::-webkit-scrollbar { width: 5px; }
.tree-panel::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.node { position: relative; }

.node-row {
  display: flex;
  align-items: center;
  height: var(--row-h);
  gap: 6px;
  cursor: pointer;
  border-left: 2px solid transparent;
  padding-right: 12px;
  transition: background 100ms, border-color 100ms;
  position: relative;
}
.node-row:hover { background: var(--hover); }
.node-row.selected {
  background: var(--selected);
  border-left-color: var(--sel-bar);
}

/* ── BOWTIE ICON ── */
.wi-icon {
  width: 16px; height: 16px;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.wi-icon svg { width: 10px; height: 10px; }

/* toggle chevron */
.toggle {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--text-muted);
  font-size: 8px;
  transition: transform 140ms ease;
  border-radius: 3px;
}
.toggle:hover { background: var(--border); }
.toggle.open { transform: rotate(90deg); }
.toggle.leaf { opacity: 0; pointer-events: none; }

.title-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  color: var(--text);
  font-weight: 400;
}
.node-row.selected .title-text { font-weight: 500; color: #0053a0; }

/* guide line */
.children-wrap { position: relative; }
.children-wrap::before {
  content: '';
  position: absolute;
  top: 0; bottom: 8px;
  width: 1px;
  background: var(--border);
  left: var(--guide-x);
  pointer-events: none;
}

.children { display: none; }
.children.open { display: block; }

/* ── DETAIL PANEL ── */
.detail-panel {
  flex: 1;
  background: var(--bg);
  overflow-y: auto;
  padding: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}
.detail-panel::-webkit-scrollbar { width: 5px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 10px; color: var(--text-muted);
}
.empty-icon { font-size: 28px; opacity: .25; }
.empty-msg { font-size: 12px; }

/* detail header bar */
.det-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 28px;
  background: #fff;
  border-bottom: 1px solid var(--border);
}

.det-wi-icon {
  width: 24px; height: 24px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.det-wi-icon svg { width: 14px; height: 14px; }

.det-type-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.det-sep { width: 1px; height: 16px; background: var(--border); }

.det-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

/* detail body */
.det-body {
  padding: 24px 28px 40px;
}

.det-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 24px;
}

/* field */
.field { margin-bottom: 20px; }

.field-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.field-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.copy-btn {
  font-size: 11px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 500;
  padding: 3px 10px;
  border: 1px solid var(--border-2);
  border-radius: 4px;
  background: #fff;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 100ms;
}
.copy-btn:hover { background: #EEF3FD; border-color: #0078D4; color: #0078D4; }
.copy-btn.ok { background: #E6F4EA; border-color: #1E7E34; color: #1E7E34; }

.field-value {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 38px;
}
.field-value.title-v { font-weight: 500; font-size: 14px; }
.field-value.empty-v { color: var(--text-muted); font-style: italic; font-size: 12px; }
</style>
</head>

<script>
const DATA = {"items": [{"csv_id": 1, "tipo": "Epic", "titulo": "Dashboard Analítico Portal Único MS", "descricao": "Levantamento analítico do Portal Único de Serviços do MS, cruzando dados do Matomo (acessos), Google Analytics (app MS Digital) e banco de dados de cartas de serviço. Objetivo: subsidiar decisões da gestão sobre uso real dos serviços pelo cidadão.", "projeto_ado": "SETDIG", "csv_id_pai": null, "prioridade": 2, "sprint": "", "estimativa_horas": null, "tags": "portal-unico matomo", "ado_id": ""}, {"csv_id": 2, "tipo": "Feature", "titulo": "Painel de Acessos (Matomo)", "descricao": "Painel interativo de análise de acessos ao Portal Único via API do Matomo (idSite=298, webanalytics.ms.gov.br). Exibe páginas mais acessadas, buscas do cidadão e filtros por período (dia/semana/mês/ano).", "projeto_ado": "SETDIG", "csv_id_pai": 1, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": null, "tags": "", "ado_id": ""}, {"csv_id": 3, "tipo": "Feature", "titulo": "Painel MS Digital (GA4)", "descricao": "Painel de análise do app MS Digital usando Google Analytics GA4. Exibe uso por categoria de serviço, comparando serviços nativos (screenPageViews) e redirecionados (eventCount/cliques). Pessoas = activeUsers; não somam entre categorias por sobreposição de usuários.", "projeto_ado": "SETDIG", "csv_id_pai": 1, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": null, "tags": "", "ado_id": ""}, {"csv_id": 4, "tipo": "Feature", "titulo": "Ranking Cartas de Serviço", "descricao": "Identificação e ranqueamento automático das Cartas de Serviço mais acessadas no portal, usando regex para isolar slugs de serviço nas URLs retornadas pela API Matomo — excluindo diretórios raiz como /index e /busca.", "projeto_ado": "SETDIG", "csv_id_pai": 1, "prioridade": 2, "sprint": "Sprint 2", "estimativa_horas": null, "tags": "", "ado_id": ""}, {"csv_id": 5, "tipo": "Product Backlog Item", "titulo": "Visualizar top páginas mais acessadas por período", "descricao": "Como gestor, quero visualizar as páginas mais acessadas do Portal Único em qualquer período (dia/semana/mês/ano), para identificar quais serviços têm maior demanda dos cidadãos e onde concentrar esforços de melhoria.", "projeto_ado": "SETDIG", "csv_id_pai": 2, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": 8, "tags": "", "ado_id": ""}, {"csv_id": 6, "tipo": "Product Backlog Item", "titulo": "Exibir palavras-chave mais buscadas no portal", "descricao": "Como gestor, quero ver as palavras-chave mais buscadas na barra de pesquisa do portal, para identificar gargalos de navegação — situações em que o cidadão não encontra o serviço no menu e recorre à busca como alternativa.", "projeto_ado": "SETDIG", "csv_id_pai": 2, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": 6, "tags": "", "ado_id": ""}, {"csv_id": 7, "tipo": "Product Backlog Item", "titulo": "Mostrar jornada de navegação (transições) da carta de serviço principal", "descricao": "Como gestor, quero ver de onde os usuários vieram antes de acessar o serviço mais popular e para onde foram depois (ou se abandonaram), para entender a jornada completa do cidadão no portal e identificar pontos de atrito.", "projeto_ado": "SETDIG", "csv_id_pai": 2, "prioridade": 3, "sprint": "Sprint 2", "estimativa_horas": 13, "tags": "", "ado_id": ""}, {"csv_id": 8, "tipo": "Product Backlog Item", "titulo": "Integrar dados GA4 para app MS Digital", "descricao": "Como gestor, quero visualizar os dados de uso do app MS Digital (pessoas únicas e acessos por categoria e serviço), para comparar o canal digital nativo com o portal web e identificar diferenças de adoção por tipo de serviço.", "projeto_ado": "SETDIG", "csv_id_pai": 3, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": 16, "tags": "", "ado_id": ""}, {"csv_id": 9, "tipo": "Product Backlog Item", "titulo": "Filtrar e rankear Cartas de Serviço via regex nas URLs", "descricao": "Como analista, quero que o sistema identifique automaticamente as Cartas de Serviço nas URLs do Matomo usando regex, gerando um ranking focado nos serviços reais oferecidos ao cidadão — separado das páginas institucionais e de navegação.", "projeto_ado": "SETDIG", "csv_id_pai": 4, "prioridade": 2, "sprint": "Sprint 2", "estimativa_horas": 8, "tags": "", "ado_id": ""}, {"csv_id": 10, "tipo": "Task", "titulo": "Criar matomo_client.py com autenticação e builder de URL", "descricao": "Criar módulo api/matomo_client.py com: autenticação por token (leitura de .env/st.secrets), builder de URL base para requisições à API do Matomo (webanalytics.ms.gov.br, idSite=298), e função genérica get(method, params) que retorna JSON tratado.", "projeto_ado": "SETDIG", "csv_id_pai": 5, "prioridade": null, "sprint": "Sprint 1", "estimativa_horas": 4, "tags": "", "ado_id": ""}, {"csv_id": 11, "tipo": "Task", "titulo": "Implementar Actions.getPageUrls no data_processor.py", "descricao": "Implementar função em utils/data_processor.py que chama Actions.getPageUrls com parâmetro de período e retorna DataFrame pandas com colunas: label (URL), nb_visits, nb_uniq_visitors. Incluir filtro para remover URLs raiz (/index, /busca, /home).", "projeto_ado": "SETDIG", "csv_id_pai": 5, "prioridade": null, "sprint": "Sprint 1", "estimativa_horas": 3, "tags": "", "ado_id": ""}, {"csv_id": 12, "tipo": "Task", "titulo": "Renderizar gráfico de barras no app.py (top 10 páginas)", "descricao": "No app.py, adicionar seção 'Top Páginas' com st.selectbox para seleção de período e gráfico de barras horizontais Plotly mostrando as 10 URLs mais acessadas. Tooltip deve exibir nb_visits e nb_uniq_visitors.", "projeto_ado": "SETDIG", "csv_id_pai": 5, "prioridade": null, "sprint": "Sprint 1", "estimativa_horas": 2, "tags": "", "ado_id": ""}, {"csv_id": 13, "tipo": "Task", "titulo": "Implementar Actions.getSiteSearchKeywords e exibir tabela", "descricao": "Implementar em data_processor.py chamada ao método Actions.getSiteSearchKeywords. Exibir resultado no app.py como st.dataframe com colunas: palavra-chave, total de buscas, percentual do total. Ordenar por frequência decrescente.", "projeto_ado": "SETDIG", "csv_id_pai": 6, "prioridade": null, "sprint": "Sprint 1", "estimativa_horas": 3, "tags": "", "ado_id": ""}, {"csv_id": 14, "tipo": "Task", "titulo": "Implementar Transitions.getTransitionsForPageUrl", "descricao": "Implementar em matomo_client.py chamada ao método Transitions.getTransitionsForPageUrl para a URL da carta de serviço mais acessada. Retornar estrutura com previousPages (de onde vieram), followingPages (para onde foram) e bounceRate.", "projeto_ado": "SETDIG", "csv_id_pai": 7, "prioridade": null, "sprint": "Sprint 2", "estimativa_horas": 5, "tags": "", "ado_id": ""}, {"csv_id": 15, "tipo": "Task", "titulo": "Exibir diagrama de fluxo (entrada/saída) com Plotly", "descricao": "No app.py, renderizar Sankey diagram (Plotly go.Sankey) mostrando páginas de origem → carta de serviço → páginas de destino, usando os dados de transições. Limitar a top 5 origens e top 5 destinos para legibilidade.", "projeto_ado": "SETDIG", "csv_id_pai": 7, "prioridade": null, "sprint": "Sprint 2", "estimativa_horas": 4, "tags": "", "ado_id": ""}, {"csv_id": 16, "tipo": "Task", "titulo": "Adicionar @st.cache_data para evitar timeout (period=year)", "descricao": "Decorar todas as funções que chamam a API Matomo com @st.cache_data(ttl=3600) no app.py. Testar especificamente com period=year para garantir que o tempo de carregamento não excede o timeout do servidor Matomo.", "projeto_ado": "SETDIG", "csv_id_pai": 7, "prioridade": null, "sprint": "Sprint 2", "estimativa_horas": 2, "tags": "", "ado_id": ""}, {"csv_id": 17, "tipo": "Task", "titulo": "Conectar GA4 Data API no ga4_client.py (activeUsers + screenPageViews)", "descricao": "Criar api/ga4_client.py com autenticação via service account (google-auth). Implementar função get_report(dimensions, metrics, start_date, end_date) usando GA4 Data API. Configurar property_id e credenciais no config.py / st.secrets.", "projeto_ado": "SETDIG", "csv_id_pai": 8, "prioridade": null, "sprint": "Sprint 1", "estimativa_horas": 6, "tags": "", "ado_id": ""}, {"csv_id": 18, "tipo": "Task", "titulo": "Criar painel MS Digital no app.py com filtro de período", "descricao": "Adicionar aba ou seção 'MS Digital' no app.py com st.selectbox de período. Exibir tabela de categorias com colunas: categoria, pessoas (activeUsers), acessos (screenPageViews). Incluir botão de detalhe que abre modal com breakdown por serviço.", "projeto_ado": "SETDIG", "csv_id_pai": 8, "prioridade": null, "sprint": "Sprint 1", "estimativa_horas": 4, "tags": "", "ado_id": ""}, {"csv_id": 19, "tipo": "Task", "titulo": "Definir regex pattern para Cartas de Serviço em data_processor.py", "descricao": "Implementar função is_carta_servico(url) em utils/data_processor.py usando regex. Critérios positivos: slug com hífen, padrão de ação ('requerer', 'solicitar', 'agendar', 'pagar'). Critérios negativos: /index, /busca, /home, /imprimir isolado.", "projeto_ado": "SETDIG", "csv_id_pai": 9, "prioridade": null, "sprint": "Sprint 2", "estimativa_horas": 3, "tags": "", "ado_id": ""}, {"csv_id": 20, "tipo": "Task", "titulo": "Exibir ranking de cartas com acessos e comparativo mensal", "descricao": "No app.py, seção 'Cartas de Serviço': tabela com top 20 cartas filtradas mostrando URL, acessos do período e delta percentual vs. mês anterior. Destacar visualmente cartas com crescimento acima de 20% (badge ou cor de fundo).", "projeto_ado": "SETDIG", "csv_id_pai": 9, "prioridade": null, "sprint": "Sprint 2", "estimativa_horas": 3, "tags": "", "ado_id": ""}]};

  "Epic": "Epic", "Feature": "Feature",
  "Product Backlog Item": "Product Backlog Item",

const map = {};
DATA.items.forEach(it => { map[it.csv_id] = { ...it, children: [] }; });
const roots = [];
DATA.items.forEach(it => {
  const n = map[it.csv_id];

document.getElementById("hdr-count").textContent =
  `${DATA.items.length} items`;

function wiIcon(tipo, size = 16) {
  const ic = ICONS[tipo] || ICONS["Task"];
  const el = document.createElement("div");
  el.className = "wi-icon";
  el.style.cssText = `width:${size}px;height:${size}px;background:${ic.bg};border-radius:${size<=16?'3':'4'}px;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  el.innerHTML = ic.svg;
  return el;
}

function renderNode(node, depth) {
  const wrap = document.createElement("div");
  wrap.className = "node";

  const row = document.createElement("div");
  row.className = "node-row";
  row.style.paddingLeft = (8 + depth * INDENT_PX) + "px";
  row.dataset.id = node.csv_id;

  const toggle = document.createElement("span");
  toggle.className = "toggle" + (node.children.length ? "" : " leaf");
  toggle.innerHTML = "▶";

  const icon = wiIcon(node.tipo, 16);

  const title = document.createElement("span");
  title.className = "title-text";
  title.textContent = node.titulo;

  row.appendChild(toggle);
  row.appendChild(icon);
  row.appendChild(title);

  // children
  const childWrap = document.createElement("div");
  childWrap.className = "children-wrap";
  childWrap.style.setProperty("--guide-x", (16 + depth * INDENT_PX) + "px");

  const childrenDiv = document.createElement("div");
  childrenDiv.className = "children";
  node.children.forEach(c => childrenDiv.appendChild(renderNode(c, depth + 1)));
  childWrap.appendChild(childrenDiv);

  row.addEventListener("click", e => {
    e.stopPropagation();
    if (node.children.length) {
      const open = childrenDiv.classList.toggle("open");
      toggle.classList.toggle("open", open);
    }
    document.querySelectorAll(".node-row.selected").forEach(r => r.classList.remove("selected"));
    row.classList.add("selected");
    renderDetail(node);
  });

  wrap.appendChild(row);
  wrap.appendChild(childWrap);
  return wrap;
}

function copy(text, btn) {
  (navigator.clipboard?.writeText(text) || Promise.reject())
    .then(() => flash(btn))
    .catch(() => {
      const ta = Object.assign(document.createElement("textarea"), { value: text });
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      flash(btn);
    });
}
function flash(btn) {
  const t = btn.textContent;
  btn.textContent = "✓ Copiado"; btn.classList.add("ok");
  setTimeout(() => { btn.textContent = t; btn.classList.remove("ok"); }, 1400);
}

function field(label, value, cls = "") {
  const w = document.createElement("div"); w.className = "field";
  const top = document.createElement("div"); top.className = "field-top";
  const lbl = document.createElement("span"); lbl.className = "field-label"; lbl.textContent = label;
  const btn = document.createElement("button"); btn.className = "copy-btn"; btn.textContent = "Copiar";
  btn.addEventListener("click", () => copy(value || "", btn));
  top.appendChild(lbl); top.appendChild(btn);
  const val = document.createElement("div");
  val.className = "field-value" + (cls ? " "+cls : "") + (value ? "" : " empty-v");
  val.textContent = value || "(sem preenchimento)";
  w.appendChild(top); w.appendChild(val);
  return w;
}

function renderDetail(node) {
  const panel = document.getElementById("detail");
  panel.innerHTML = "";

  const ic = ICONS[node.tipo] || ICONS["Task"];

  // header bar
  const hdr = document.createElement("div"); hdr.className = "det-header";
  const bigIcon = wiIcon(node.tipo, 24); bigIcon.className = "det-wi-icon";
  bigIcon.style.cssText = `width:24px;height:24px;background:${ic.bg};border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  const typeLabel = document.createElement("span"); typeLabel.className = "det-type-label";
  typeLabel.style.color = ic.bg; typeLabel.textContent = LABEL[node.tipo] || node.tipo;
  const sep = document.createElement("div"); sep.className = "det-sep";
  const idEl = document.createElement("span"); idEl.className = "det-id";
  idEl.textContent = node.ado_id ? `#${node.ado_id}` : `CSV-${node.csv_id}`;
  hdr.appendChild(bigIcon); hdr.appendChild(typeLabel);
  hdr.appendChild(sep); hdr.appendChild(idEl);
  panel.appendChild(hdr);

  // body
  const body = document.createElement("div"); body.className = "det-body";
  const titleEl = document.createElement("div"); titleEl.className = "det-title";
  titleEl.textContent = node.titulo;
  body.appendChild(titleEl);
  body.appendChild(field("Título", node.titulo, "title-v"));
  body.appendChild(field("Descrição", node.descricao));
  panel.appendChild(body);
}

const treeEl = document.getElementById("tree");
roots.forEach(r => treeEl.appendChild(renderNode(r, 0)));

document.querySelectorAll(".node-row[data-id]").forEach(row => {
  const n = map[parseInt(row.dataset.id)];
  if (n?.tipo === "Epic" && n.children.length) row.click();
});
</script>
</body>
