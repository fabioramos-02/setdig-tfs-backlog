<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backlog — SETDIG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F8F9FB;
  --surface:   #FFFFFF;
  --border:    #E5E8ED;
  --border-2:  #D0D5DE;
  --text:      #1A1D23;
  --text-sub:  #5A6070;
  --text-muted:#9299A8;
  --selected:  #EEF3FD;
  --sel-bar:   #0078D4;
  --hover:     #F3F5F9;

  /* ADO bowtie colors */
  --c-epic:    #5C2D91;
  --c-feat:    #009CCC;
  --c-pbi:     #009CCC;
  --c-task:    #B08A00;
  --c-bug:     #CC293D;

  --c-epic-bg: #EDE7F6;
  --c-feat-bg: #E1F5FE;
  --c-pbi-bg:  #E1F5FE;
  --c-task-bg: #FFF8E1;
  --c-bug-bg:  #FDECEA;

  --indent: 20px;
  --row-h: 32px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 0;
  height: 48px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 20px;
}

.hdr-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-right: 20px;
  border-right: 1px solid var(--border);
  margin-right: 16px;
}

.hdr-brand-icon {
  width: 28px; height: 28px;
  background: #0078D4;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}

.hdr-brand-icon svg { width: 16px; height: 16px; }

.hdr-org {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}

.hdr-team {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.hdr-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sub);
}

.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.hdr-pill {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 10px;
}

/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── TREE ── */
.tree-panel {
  width: 50%;
  min-width: 320px;
  overflow-y: auto;
  background: #fff;
  border-right: 1px solid var(--border);
  padding: 8px 0 32px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}
.tree-panel::-webkit-scrollbar { width: 5px; }
.tree-panel::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.node { position: relative; }

.node-row {
  display: flex;
  align-items: center;
  height: var(--row-h);
  gap: 6px;
  cursor: pointer;
  border-left: 2px solid transparent;
  padding-right: 12px;
  transition: background 100ms, border-color 100ms;
  position: relative;
}
.node-row:hover { background: var(--hover); }
.node-row.selected {
  background: var(--selected);
  border-left-color: var(--sel-bar);
}

/* ── BOWTIE ICON ── */
.wi-icon {
  width: 16px; height: 16px;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.wi-icon svg { width: 10px; height: 10px; }

/* toggle chevron */
.toggle {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--text-muted);
  font-size: 8px;
  transition: transform 140ms ease;
  border-radius: 3px;
}
.toggle:hover { background: var(--border); }
.toggle.open { transform: rotate(90deg); }
.toggle.leaf { opacity: 0; pointer-events: none; }

.title-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  color: var(--text);
  font-weight: 400;
}
.node-row.selected .title-text { font-weight: 500; color: #0053a0; }

/* guide line */
.children-wrap { position: relative; }
.children-wrap::before {
  content: '';
  position: absolute;
  top: 0; bottom: 8px;
  width: 1px;
  background: var(--border);
  left: var(--guide-x);
  pointer-events: none;
}

.children { display: none; }
.children.open { display: block; }

/* ── DETAIL PANEL ── */
.detail-panel {
  flex: 1;
  background: var(--bg);
  overflow-y: auto;
  padding: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}
.detail-panel::-webkit-scrollbar { width: 5px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 10px; color: var(--text-muted);
}
.empty-icon { font-size: 28px; opacity: .25; }
.empty-msg { font-size: 12px; }

/* detail header bar */
.det-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 28px;
  background: #fff;
  border-bottom: 1px solid var(--border);
}

.det-wi-icon {
  width: 24px; height: 24px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.det-wi-icon svg { width: 14px; height: 14px; }

.det-type-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.det-sep { width: 1px; height: 16px; background: var(--border); }

.det-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

/* detail body */
.det-body {
  padding: 24px 28px 40px;
}

.det-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 24px;
}

/* field */
.field { margin-bottom: 20px; }

.field-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.field-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.copy-btn {
  font-size: 11px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 500;
  padding: 3px 10px;
  border: 1px solid var(--border-2);
  border-radius: 4px;
  background: #fff;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 100ms;
}
.copy-btn:hover { background: #EEF3FD; border-color: #0078D4; color: #0078D4; }
.copy-btn.ok { background: #E6F4EA; border-color: #1E7E34; color: #1E7E34; }

.field-value {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 38px;
}
.field-value.title-v { font-weight: 500; font-size: 14px; }
.field-value.empty-v { color: var(--text-muted); font-style: italic; font-size: 12px; }
</style>
</head>

tipo": "Task", "titulo": "Conectar GA4 Data API no ga4_client.py (activeUsers + screenPageViews)", "descricao": "", "projeto_ado": "SETDIG", "csv_id_pai": 8, "prioridade": null, "sprint": "Sprint 1", "estimativa_horas": 6, "tags": "", "ado_id": ""}, {"csv_id": 18, "tipo": "Task", "titulo": "Criar painel MS Digital no app.py com filtro de período", "descricao": "", "projeto_ado": "SETDIG", "csv_id_pai": 8, "prioridade": null, "sprint": "Sprint 1", "estimativa_horas": 4, "tags": "", "ado_id": ""}, {"csv_id": 19, "tipo": "Task", "titulo": "Definir regex pattern para Cartas de Serviço em data_processor.py", "descricao": "", "projeto_ado": "SETDIG", "csv_id_pai": 9, "prioridade": null, "sprint": "Sprint 2", "estimativa_horas": 3, "tags": "", "ado_id": ""}, {"csv_id": 20, "tipo": "Task", "titulo": "Exibir ranking de cartas com acessos e comparativo mensal", "descricao": "", "projeto_ado": "SETDIG", "csv_id_pai": 9, "prioridade": null, "sprint": "Sprint 2", "estimativa_horas": 3, "tags": "", "ado_id": ""}, {"csv_id": 21, "tipo": "Epic", "titulo": "Cruzamento e Higienizacao de Cartas de Servico (CGE-MS)", "descricao": "**Descrição**\nTema de higienização da base de Cartas de Serviço do Portal ms.gov.br. Reduzir duplicidades entre órgãos, padronizar conteúdo e dar ao gestor da CGE-MS uma visão consolidada do que pode ser unificado, mantido ou descartado.\n\n**Critérios de Aceitação**\n- Snapshot reprodutível da base de cartas extraído por pipeline automatizado.\n- Relatório HTML standalone que mostra clusters de duplicatas, diff entre cópias e KPIs de redução potencial.\n- Documentação mínima (README + plano.md) que permita outro analista rodar o pipeline sem suporte.\n- Aprovação da CGE-MS sobre o formato do relatório.", "projeto_ado": "SETDIG", "csv_id_pai": null, "prioridade": 2, "sprint": "", "estimativa_horas": null, "tags": "cge,cartas-servico,higienizacao", "ado_id": ""}, {"csv_id": 22, "tipo": "Feature", "titulo": "Extracao e limpeza de cartas (Postgres -> CSV)", "descricao": "**Descrição**\nPipeline de extração que conecta no Postgres (via VPN), aplica JOIN com `gerenciamento_jornada`, limpa HTML/entidades e gera CSV consumível pelas demais etapas. Base reprodutível para todo o cruzamento.\n\n**Critérios de Aceitação**\n- Comando `run.bat --snapshot` gera CSV em `exports/` sem intervenção manual.\n- HTML e entidades (`&amp;`, `&nbsp;`, etc.) removidos do texto persistido.\n- Conexão configurada via `.env` (sem credenciais no repo).\n- Smoke test (`pytest tests/test_smoke_db.py`) passa com VPN ativa.", "projeto_ado": "SETDIG", "csv_id_pai": 21, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "extracao,limpeza,postgres", "ado_id": ""}, {"csv_id": 23, "tipo": "Feature", "titulo": "Analise de similaridade e clusterizacao (8 campos ponderados)", "descricao": "**Descrição**\nAlgoritmo de similaridade que pontua pares de cartas com base em 8 campos ponderados (título 25%, descrição 20%, etapas 15%, requisitos 15%, público 10%, nome popular 5%, palavra-chave 5%, tempo 5%) e gera clusters de duplicatas/quase-duplicatas.\n\n**Critérios de Aceitação**\n- Score composto reproduzível com seed/threshold configuráveis via CLI.\n- Clusters exportados em CSV (`cartas_clusters_resumo.csv`).\n- Diff por cluster (campos iguais vs. campos divergentes) disponível para consumo do relatório.\n- Threshold default 0.65 ajustável via `--threshold`.", "projeto_ado": "SETDIG", "csv_id_pai": 21, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "similaridade,clusters,nlp", "ado_id": ""}, {"csv_id": 24, "tipo": "Feature", "titulo": "Relatorio HTML standalone para gestor", "descricao": "**Descrição**\nRelatório HTML offline para gestor não-técnico (CGE-MS), com KPIs no topo, treemap de proporções, tabela interativa com painel expansivo, diff por cluster, pontuação de qualidade e sugestão de cadastro modelo. Linguagem simples, otimizado para A4.\n\n**Critérios de Aceitação**\n- Arquivo único, sem dependência de servidor, abre em qualquer navegador.\n- 3 KPIs no topo (serviços ativos, grupos repetidos, potencial de redução).\n- Filtro por órgão + busca por título funcionando client-side.\n- Layout imprimível em A4 sem corte de conteúdo.\n- Validação visual pelo gestor SGD antes do fechamento.", "projeto_ado": "SETDIG", "csv_id_pai": 21, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": null, "tags": "relatorio,html,gestao", "ado_id": ""}, {"csv_id": 25, "tipo": "Product Backlog Item", "titulo": "Como DBA, quero detectar colunas com HTML/entities (--probe-schema)", "descricao": "**História do usuário**\nComo DBA, quero identificar colunas da base de Cartas de Serviço que ainda armazenam HTML ou entidades HTML, para priorizar limpeza no banco e evitar reprocessamento no pipeline.\n\n**Requisitos**\n- Comando `run.bat --probe-schema` varre tabelas-alvo e lista colunas com HTML/entities detectados.\n- Saída legível em terminal + export opcional para CSV.\n\n**Critérios de Aceitação**\n- Detecta `<tag>`, `&amp;`, `&nbsp;`, `&#xxx;` em colunas TEXT/VARCHAR.\n- Relata nome da coluna, tabela e contagem de ocorrências.\n- Roda sem alterar dado em produção (read-only).", "projeto_ado": "SETDIG", "csv_id_pai": 22, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "dba,probe-schema", "ado_id": ""}, {"csv_id": 26, "tipo": "Product Backlog Item", "titulo": "Como analista, quero snapshot completo das cartas ativas", "descricao": "**História do usuário**\nComo analista da CGE-MS, quero baixar um snapshot completo das cartas de serviço ativas (com etapas, requisitos e órgão), para auditar o estado da base num momento fixo.\n\n**Requisitos**\n- Snapshot inclui campos: id, título, órgão, descrição, requisitos, público, etapas, prazos, custos, nome popular, palavras-chave, status.\n- Flag `--incluir-inativas` opcional.\n\n**Critérios de Aceitação**\n- Comando `run.bat --snapshot` gera CSV em `exports/` com nome datado.\n- Execução completa em < 5min para base atual.\n- Sem perda de linhas: contagem CSV = contagem SQL `SELECT count(*)`.", "projeto_ado": "SETDIG", "csv_id_pai": 22, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "snapshot,extracao", "ado_id": ""}, {"csv_id": 27, "tipo": "Product Backlog Item", "titulo": "Como gestor, quero detectar duplicatas exatas e similares", "descricao": "**História do usuário**\nComo gestor da CGE-MS, quero ver pares e grupos de cartas com conteúdo igual ou muito próximo, para decidir quais unificar e quais manter separadas.\n\n**Requisitos**\n- Detecção de duplicatas exatas (hash dos campos normalizados).\n- Detecção de similares via score composto (8 campos).\n- Saída em CSV de clusters + insumo para o relatório HTML.\n\n**Critérios de Aceitação**\n- `run.bat --duplicatas` e `run.bat --similaridade` rodam independentemente.\n- Threshold default 0.65; ajustável via `--threshold`.\n- Cada cluster traz lista de cartas, órgãos envolvidos e score médio.", "projeto_ado": "SETDIG", "csv_id_pai": 23, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "duplicatas,similaridade", "ado_id": ""}, {"csv_id": 28, "tipo": "Product Backlog Item", "titulo": "Como gestor, quero pontuacao de qualidade + cadastro modelo sugerido", "descricao": "**História do usuário**\nComo gestor da CGE-MS, quero ver, dentro de cada cluster de duplicatas, qual cadastro está mais completo e bem preenchido, para usar como modelo na consolidação.\n\n**Requisitos**\n- Heurística de qualidade pontua campos preenchidos, tamanho mínimo de descrição, presença de etapas.\n- Cadastro com maior pontuação é destacado no relatório como \"sugerido como modelo\".\n\n**Critérios de Aceitação**\n- Pontuação documentada (peso por campo) e reproduzível.\n- Sugestão visível na visualização de cluster do relatório HTML.\n- Empate resolvido por critério estável (ex.: cadastro mais antigo).", "projeto_ado": "SETDIG", "csv_id_pai": 23, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": null, "tags": "qualidade,modelo", "ado_id": ""}, {"csv_id": 29, "tipo": "Product Backlog Item", "titulo": "Como gestor, quero relatorio HTML offline com KPIs, treemap e diff", "descricao": "**História do usuário**\nComo gestor da CGE-MS, quero abrir um relatório HTML offline com KPIs, treemap, tabela de clusters e diff visual entre cópias, para decidir consolidações sem precisar de suporte técnico.\n\n**Requisitos**\n- KPIs: serviços ativos, grupos repetidos, potencial de redução.\n- Treemap interativo de proporções.\n- Tabela com painel expansivo por cluster mostrando diff.\n- Filtro por órgão + busca por título.\n- Layout imprimível A4.\n\n**Critérios de Aceitação**\n- Arquivo único `exports/relatorio.html`, sem CDN externa obrigatória.\n- Abre em Chrome/Edge atualizados sem erro no console.\n- Aprovação visual da SGD antes da entrega à CGE-MS.", "projeto_ado": "SETDIG", "csv_id_pai": 24, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": null, "tags": "relatorio,kpi,treemap", "ado_id": ""}, {"csv_id": 30, "tipo": "Task", "titulo": "Implementar queries.py com JOIN gerenciamento_jornada", "descricao": "Implementar `queries.py` com SELECT principal das cartas ativas + JOIN com `gerenciamento_jornada` para trazer etapas. Parametrizar filtro `--incluir-inativas`.", "projeto_ado": "SETDIG", "csv_id_pai": 26, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "sql,queries", "ado_id": ""}, {"csv_id": 31, "tipo": "Task", "titulo": "html_clean.py - strip HTML + decode entities", "descricao": "Implementar `html_clean.py` com remoção de tags HTML e decodificação de entidades (`html.unescape` + regex). Cobrir casos `&amp;`, `&nbsp;`, `&#xxx;`, comentários e atributos.", "projeto_ado": "SETDIG", "csv_id_pai": 22, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "python,html", "ado_id": ""}, {"csv_id": 32, "tipo": "Task", "titulo": "extracao.py - pipeline fetch + limpeza + CSV", "descricao": "Implementar `extracao.py` orquestrando fetch via `queries.py`, limpeza via `html_clean.py` e gravação do snapshot CSV em `exports/`. Adicionar log de progresso e contagem final.", "projeto_ado": "SETDIG", "csv_id_pai": 26, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "python,pipeline", "ado_id": ""}, {"csv_id": 33, "tipo": "Task", "titulo": "CLI flag --probe-schema em cli.py", "descricao": "Adicionar flag `--probe-schema` em `cli.py` que invoca rotina de detecção de colunas com HTML/entities e imprime tabela resumida no terminal.", "projeto_ado": "SETDIG", "csv_id_pai": 25, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "cli", "ado_id": ""}, {"csv_id": 34, "tipo": "Task", "titulo": "similaridade.py - score composto 8 campos (titulo 25%, descr 20%...)", "descricao": "Implementar `similaridade.py` com score composto dos 8 campos (título 25%, descrição 20%, etapas 15%, requisitos 15%, público 10%, nome popular 5%, palavra-chave 5%, tempo 5%). Saída: par (id_a, id_b, score).", "projeto_ado": "SETDIG", "csv_id_pai": 27, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "similaridade,score", "ado_id": ""}, {"csv_id": 35, "tipo": "Task", "titulo": "clusters.py - agrupamento + diff de cluster", "descricao": "Implementar `clusters.py` agrupando cartas por score acima do threshold (union-find) e gerando, para cada cluster, o diff campo a campo (igual vs. divergente).", "projeto_ado": "SETDIG", "csv_id_pai": 27, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "clusters,diff", "ado_id": ""}, {"csv_id": 36, "tipo": "Task", "titulo": "CLI flags --threshold e --incluir-inativas", "descricao": "Expor flags `--threshold <float>` e `--incluir-inativas` em `cli.py`. Validar tipo e faixa (0–1) do threshold.", "projeto_ado": "SETDIG", "csv_id_pai": 27, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "cli", "ado_id": ""}, {"csv_id": 37, "tipo": "Task", "titulo": "Heuristica qualidade cadastro + sugestao modelo", "descricao": "Implementar heurística de qualidade do cadastro (peso por campo preenchido + tamanho mínimo de descrição) e marcar o cadastro de maior pontuação como sugerido como modelo.", "projeto_ado": "SETDIG", "csv_id_pai": 28, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": null, "tags": "qualidade", "ado_id": ""}, {"csv_id": 38, "tipo": "Task", "titulo": "relatorio.html.j2 - 3 KPIs + treemap interativo", "descricao": "Construir template `templates/relatorio.html.j2` com 3 KPIs no topo e treemap interativo (D3 ou Plotly via CDN local). Renderizar via `relatorio.py`.", "projeto_ado": "SETDIG", "csv_id_pai": 29, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": null, "tags": "jinja,html,treemap", "ado_id": ""}, {"csv_id": 39, "tipo": "Task", "titulo": "Filtro por orgao + busca por titulo no relatorio", "descricao": "Adicionar filtro por órgão (select) e busca por título (input) no relatório HTML, com filtragem client-side da tabela de clusters.", "projeto_ado": "SETDIG", "csv_id_pai": 29, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": null, "tags": "filtros,ux", "ado_id": ""}, {"csv_id": 40, "tipo": "Task", "titulo": "Bloco de diff visual por cluster", "descricao": "Renderizar bloco de diff visual por cluster: lista de campos iguais (colapsada) e campos divergentes (expandida com lado a lado das cópias).", "projeto_ado": "SETDIG", "csv_id_pai": 29, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": null, "tags": "diff,ux", "ado_id": ""}, {"csv_id": 41, "tipo": "Task", "titulo": "Otimizacao A4 para impressao", "descricao": "Ajustar CSS para impressão A4: `@media print`, quebras de página por cluster, fontes legíveis, ocultar controles interativos.", "projeto_ado": "SETDIG", "csv_id_pai": 29, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": null, "tags": "print,css", "ado_id": ""}, {"csv_id": 42, "tipo": "Task", "titulo": "db.py - conexao via .env (python-dotenv + VPN)", "descricao": "Implementar `db.py` carregando credenciais via `python-dotenv` a partir de `.env`. Documentar requisito de VPN ativa.", "projeto_ado": "SETDIG", "csv_id_pai": 22, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "db,env", "ado_id": ""}, {"csv_id": 43, "tipo": "Task", "titulo": "normalize.py - normalizacao de texto", "descricao": "Implementar `normalize.py` com normalização de texto: lowercase, remoção de acentos, colapso de espaços, strip. Usar nos campos antes da comparação.", "projeto_ado": "SETDIG", "csv_id_pai": 22, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "normalizacao", "ado_id": ""}, {"csv_id": 44, "tipo": "Task", "titulo": "Testes: test_smoke_db.py + test_html_clean.py", "descricao": "Escrever `tests/test_smoke_db.py` (conexão e SELECT 1 com VPN) e `tests/test_html_clean.py` (cobrindo tags, entidades nomeadas/numéricas, comentários).", "projeto_ado": "SETDIG", "csv_id_pai": 22, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "testes,pytest", "ado_id": ""}]};

// ── Bowtie SVG icons (ADO style) ──────────────────────────────────────────
const ICONS = {
  "Epic": {
    bg: "#5C2D91", fg: "#EDE7F6",
    svg: `<svg viewBox="0 0 10 10" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 1L1 4v5h3V6h2v3h3V4L5 1z"/>
    </svg>`
  },
  "Feature": {
    bg: "#009CCC", fg: "#E1F5FE",
    svg: `<svg viewBox="0 0 10 10" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M5.5 1L3 5.5h2.5L4 9l5-5H6.5z"/>
    </svg>`
  },
  "Product Backlog Item": {
    bg: "#009CCC", fg: "#E1F5FE",
    svg: `<svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="1.2" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="8" height="8" rx="1"/>
      <circle cx="5" cy="5" r="1.5" fill="white" stroke="none"/>
    </svg>`
  },
  "Task": {
    bg: "#D8A500", fg: "#FFF8E1",
    svg: `<svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="8" height="8" rx="1"/>
      <polyline points="3,5 4.3,6.5 7,3.5"/>
    </svg>`
  },
  "Bug": {
    bg: "#CC293D", fg: "#FDECEA",
    svg: `<svg viewBox="0 0 10 10" fill="white" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="5" cy="5.5" rx="2.5" ry="3"/>
      <path d="M3.5 2.5 Q5 1 6.5 2.5" stroke="white" stroke-width="1" fill="none"/>
      <line x1="1" y1="4" x2="3" y2="4.5" stroke="white" stroke-width="1"/>
      <line x1="9" y1="4" x2="7" y2="4.5" stroke="white" stroke-width="1"/>
      <line x1="1" y1="6.5" x2="2.5" y2="6.5" stroke="white" stroke-width="1"/>
      <line x1="9" y1="6.5" x2="7.5" y2="6.5" stroke="white" stroke-width="1"/>
    </svg>`
  },
};
const LABEL = {
  "Epic": "Epic", "Feature": "Feature",
  "Product Backlog Item": "Product Backlog Item",
  "Task": "Task", "Bug": "Bug",
};
const INDENT_PX = 20;

const map = {};
DATA.items.forEach(it => { map[it.csv_id] = { ...it, children: [] }; });
const roots = [];
DATA.items.forEach(it => {
  const n = map[it.csv_id];
  if (it.csv_id_pai && map[it.csv_id_pai]) map[it.csv_id_pai].children.push(n);
  else roots.push(n);
});

document.getElementById("hdr-count").textContent =
  `${DATA.items.length} items`;

function wiIcon(tipo, size = 16) {
  const ic = ICONS[tipo] || ICONS["Task"];
  const el = document.createElement("div");
  el.className = "wi-icon";
  el.style.cssText = `width:${size}px;height:${size}px;background:${ic.bg};border-radius:${size<=16?'3':'4'}px;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  el.innerHTML = ic.svg;
  return el;
}

function renderNode(node, depth) {
  const wrap = document.createElement("div");
  wrap.className = "node";

  const row = document.createElement("div");
  row.className = "node-row";
  row.style.paddingLeft = (8 + depth * INDENT_PX) + "px";
  row.dataset.id = node.csv_id;

  const toggle = document.createElement("span");
  toggle.className = "toggle" + (node.children.length ? "" : " leaf");
  toggle.innerHTML = "▶";

  const icon = wiIcon(node.tipo, 16);

  const title = document.createElement("span");
  title.className = "title-text";
  title.textContent = node.titulo;

  row.appendChild(toggle);
  row.appendChild(icon);
  row.appendChild(title);

  // children
  const childWrap = document.createElement("div");
  childWrap.className = "children-wrap";
  childWrap.style.setProperty("--guide-x", (16 + depth * INDENT_PX) + "px");

  const childrenDiv = document.createElement("div");
  childrenDiv.className = "children";
  node.children.forEach(c => childrenDiv.appendChild(renderNode(c, depth + 1)));
  childWrap.appendChild(childrenDiv);

  row.addEventListener("click", e => {
    e.stopPropagation();
    if (node.children.length) {
      const open = childrenDiv.classList.toggle("open");
      toggle.classList.toggle("open", open);
    }
    document.querySelectorAll(".node-row.selected").forEach(r => r.classList.remove("selected"));
    row.classList.add("selected");
    renderDetail(node);
  });

  wrap.appendChild(row);
  wrap.appendChild(childWrap);
  return wrap;
}

function copy(text, btn) {
  (navigator.clipboard?.writeText(text) || Promise.reject())
    .then(() => flash(btn))
    .catch(() => {
      const ta = Object.assign(document.createElement("textarea"), { value: text });
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      flash(btn);
    });
}
function flash(btn) {
  const t = btn.textContent;
  btn.textContent = "✓ Copiado"; btn.classList.add("ok");
  setTimeout(() => { btn.textContent = t; btn.classList.remove("ok"); }, 1400);
}

function field(label, value, cls = "") {
  const w = document.createElement("div"); w.className = "field";
  const top = document.createElement("div"); top.className = "field-top";
  const lbl = document.createElement("span"); lbl.className = "field-label"; lbl.textContent = label;
  const btn = document.createElement("button"); btn.className = "copy-btn"; btn.textContent = "Copiar";
  btn.addEventListener("click", () => copy(value || "", btn));
  top.appendChild(lbl); top.appendChild(btn);
  const val = document.createElement("div");
  val.className = "field-value" + (cls ? " "+cls : "") + (value ? "" : " empty-v");
  val.textContent = value || "(sem preenchimento)";
  w.appendChild(top); w.appendChild(val);
  return w;
}

function renderDetail(node) {
  const panel = document.getElementById("detail");
  panel.innerHTML = "";

  const ic = ICONS[node.tipo] || ICONS["Task"];

  // header bar
  const hdr = document.createElement("div"); hdr.className = "det-header";
  const bigIcon = wiIcon(node.tipo, 24); bigIcon.className = "det-wi-icon";
  bigIcon.style.cssText = `width:24px;height:24px;background:${ic.bg};border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  const typeLabel = document.createElement("span"); typeLabel.className = "det-type-label";
  typeLabel.style.color = ic.bg; typeLabel.textContent = LABEL[node.tipo] || node.tipo;
  const sep = document.createElement("div"); sep.className = "det-sep";
  const idEl = document.createElement("span"); idEl.className = "det-id";
  idEl.textContent = node.ado_id ? `#${node.ado_id}` : `CSV-${node.csv_id}`;
  hdr.appendChild(bigIcon); hdr.appendChild(typeLabel);
  hdr.appendChild(sep); hdr.appendChild(idEl);
  panel.appendChild(hdr);

  // body
  const body = document.createElement("div"); body.className = "det-body";
  const titleEl = document.createElement("div"); titleEl.className = "det-title";
  titleEl.textContent = node.titulo;
  body.appendChild(titleEl);
  body.appendChild(field("Título", node.titulo, "title-v"));
  body.appendChild(field("Descrição", node.descricao));
  panel.appendChild(body);
}

const treeEl = document.getElementById("tree");
roots.forEach(r => treeEl.appendChild(renderNode(r, 0)));

document.querySelectorAll(".node-row[data-id]").forEach(row => {
  const n = map[parseInt(row.dataset.id)];
  if (n?.tipo === "Epic" && n.children.length) row.click();
});
</script>
