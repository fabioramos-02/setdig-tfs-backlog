<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backlog — SETDIG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F8F9FB;
  --surface:   #FFFFFF;
  --border:    #E5E8ED;
  --border-2:  #D0D5DE;
  --text:      #1A1D23;
  --text-sub:  #5A6070;
  --text-muted:#9299A8;
  --selected:  #EEF3FD;
  --sel-bar:   #0078D4;
  --hover:     #F3F5F9;

  /* TFS / Azure DevOps official colors */
  --c-epic:    #FF7B00;
  --c-feat:    #773B93;
  --c-pbi:     #009CCC;
  --c-task:    #F2CB1D;
  --c-bug:     #CC293D;

  --c-epic-bg: #FFF3E0;
  --c-feat-bg: #EDE7F6;
  --c-pbi-bg:  #E1F5FE;
  --c-task-bg: #FFF8E1;
  --c-bug-bg:  #FDECEA;

  --indent: 20px;
  --row-h: 32px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 0;
  height: 48px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 20px;
}

.hdr-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-right: 20px;
  border-right: 1px solid var(--border);
  margin-right: 16px;
}

.hdr-brand-icon {
  width: 28px; height: 28px;
  background: #0078D4;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}

.hdr-brand-icon svg { width: 16px; height: 16px; }

.hdr-org {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}

.hdr-team {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.hdr-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sub);
}

.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.hdr-pill {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 10px;
}

/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── TREE ── */
.tree-panel {
  width: 50%;
  min-width: 320px;
  overflow-y: auto;
  background: #fff;
  border-right: 1px solid var(--border);
  padding: 8px 0 32px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}
.tree-panel::-webkit-scrollbar { width: 5px; }
.tree-panel::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.node { position: relative; }

.node-row {
  display: flex;
  align-items: center;
  height: var(--row-h);
  gap: 6px;
  cursor: pointer;
  border-left: 2px solid transparent;
  padding-right: 12px;
  transition: background 100ms, border-color 100ms;
  position: relative;
}
.node-row:hover { background: var(--hover); }
.node-row.selected {
  background: var(--selected);
  border-left-color: var(--sel-bar);
}

/* ── BOWTIE ICON ── */
.wi-icon {
  width: 16px; height: 16px;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.wi-icon svg { width: 10px; height: 10px; }

/* toggle chevron */
.toggle {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--text-muted);
  font-size: 8px;
  transition: transform 140ms ease;
  border-radius: 3px;
}
.toggle:hover { background: var(--border); }
.toggle.open { transform: rotate(90deg); }
.toggle.leaf { opacity: 0; pointer-events: none; }

.title-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  color: var(--text);
  font-weight: 400;
}
.node-row.selected .title-text { font-weight: 500; color: #0053a0; }

/* guide line */
.children-wrap { position: relative; }
.children-wrap::before {
  content: '';
  position: absolute;
  top: 0; bottom: 8px;
  width: 1px;
  background: var(--border);
  left: var(--guide-x);
  pointer-events: none;
}

.children { display: none; }
.children.open { display: block; }

/* ── DETAIL PANEL ── */
.detail-panel {
  flex: 1;
  background: var(--bg);
  overflow-y: auto;
  padding: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border-2) transparent;
}
.detail-panel::-webkit-scrollbar { width: 5px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 10px; color: var(--text-muted);
}
.empty-icon { font-size: 28px; opacity: .25; }
.empty-msg { font-size: 12px; }

/* detail header bar */
.det-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 28px;
  background: #fff;
  border-bottom: 1px solid var(--border);
}

.det-wi-icon {
  width: 24px; height: 24px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.det-wi-icon svg { width: 14px; height: 14px; }

.det-type-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.det-sep { width: 1px; height: 16px; background: var(--border); }

.det-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

/* detail body */
.det-body {
  padding: 24px 28px 40px;
}

.det-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 24px;
}

/* field */
.field { margin-bottom: 20px; }

.field-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.field-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.copy-btn {
  font-size: 11px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 500;
  padding: 3px 10px;
  border: 1px solid var(--border-2);
  border-radius: 4px;
  background: #fff;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 100ms;
}
.copy-btn:hover { background: #EEF3FD; border-color: #0078D4; color: #0078D4; }
.copy-btn.ok { background: #E6F4EA; border-color: #1E7E34; color: #1E7E34; }

.field-value {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 38px;
}
.field-value.title-v { font-weight: 500; font-size: 14px; }
.field-value.empty-v { color: var(--text-muted); font-style: italic; font-size: 12px; }
</style>
</head>

<header>
  <div class="hdr-brand">

      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">

      </svg>
    </div>
    <div>
      <div class="hdr-org">SETDIG</div>
      <div class="hdr-team">SGD — EDS Team</div>

</div>

<script>
const DATA = {"items": [{"csv_id": 100, "tipo": "Epic", "titulo": "Negocio e Governanca", "descricao": "**Descricao**\nIniciativa estrategica que cobre governanca do programa Portal Unico MS, levantamento de demandas, padronizacao de Cartas de Servico e gestao da mudanca junto aos orgaos parceiros.\n\n**Criterios de Aceitacao**\n- Governanca publicada (papeis, ritos, indicadores).\n- Levantamento de demandas e descoberta de oportunidades documentado.\n- Higienizacao das Cartas de Servico entregue com aprovacao CGE-MS.\n- Plano de gestao da mudanca comunicado e aceito pelas areas.", "projeto_ado": "SETDIG", "csv_id_pai": null, "prioridade": 2, "sprint": "", "estimativa_horas": null, "tags": "epic,governanca,programa", "ado_id": ""}, {"csv_id": 101, "tipo": "Feature", "titulo": "2.2 Levantamento e Descoberta", "descricao": "**Descricao**\nLevantar demandas, oportunidades e indicadores que orientem decisoes do programa Portal Unico MS, com base em dados de uso (Matomo, GA4) e analytics consolidados.\n\n**Criterios de Aceitacao**\n- Paineis de uso publicados e atualizados.\n- Backlog de oportunidades priorizado.\n- Aprovacao SGD sobre o dashboard analitico entregue.", "projeto_ado": "SETDIG", "csv_id_pai": 100, "prioridade": 2, "sprint": "", "estimativa_horas": null, "tags": "feature,levantamento,analytics", "ado_id": ""}, {"csv_id": 102, "tipo": "Feature", "titulo": "2.3 Cartas de Servico", "descricao": "**Descricao**\nHigienizacao, padronizacao e melhoria continua da base de Cartas de Servico do Portal Unico MS, em parceria com a CGE-MS.\n\n**Criterios de Aceitacao**\n- Base de cartas auditada e duplicidades identificadas.\n- Relatorio consolidado entregue a CGE-MS.\n- Plano de unificacao aprovado.", "projeto_ado": "SETDIG", "csv_id_pai": 100, "prioridade": 2, "sprint": "", "estimativa_horas": null, "tags": "feature,cartas-servico,higienizacao", "ado_id": ""}, {"csv_id": 103, "tipo": "Product Backlog Item", "titulo": "Dashboard Analitico Portal Unico MS", "descricao": "**Historia do usuario**\nComo gestor da SGD/SETDIG, quero um dashboard analitico consolidando dados de Matomo (Portal Unico), Google Analytics GA4 (MS Digital) e ranking de Cartas de Servico, para tomar decisoes baseadas no uso real do cidadao.\n\n**Requisitos**\n- Painel de Acessos (Matomo, idSite=298): top paginas, palavras-chave buscadas, jornada de navegacao.\n- Painel MS Digital (GA4): activeUsers + screenPageViews com filtro de periodo.\n- Ranking de Cartas de Servico com comparativo mensal.\n- App em producao: https://setdig-dados.streamlit.app/\n\n**Criterios de Aceitacao**\n- 3 paineis funcionando (Matomo, GA4, Ranking).\n- Filtro de periodo em todos os paineis.\n- Cache (`@st.cache_data`) ativo para evitar timeout em `period=year`.\n- Visualizacao aprovada pela SGD.", "projeto_ado": "SETDIG", "csv_id_pai": 101, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": null, "tags": "dashboard,matomo,ga4,portal-unico", "ado_id": ""}, {"csv_id": 104, "tipo": "Task", "titulo": "Visualizar top paginas mais acessadas por periodo", "descricao": "Implementar painel \"Top paginas mais acessadas\" no Matomo, com filtro de periodo.\n\nSubatividades:\n- Criar `matomo_client.py` com autenticacao e builder de URL.\n- Implementar `Actions.getPageUrls` em `data_processor.py`.\n- Renderizar grafico de barras no `app.py` (top 10 paginas).", "projeto_ado": "SETDIG", "csv_id_pai": 103, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": 9, "tags": "matomo,top-paginas", "ado_id": ""}, {"csv_id": 105, "tipo": "Task", "titulo": "Exibir palavras-chave mais buscadas no portal", "descricao": "Implementar painel \"Palavras-chave buscadas no portal\".\n\nSubatividades:\n- Implementar `Actions.getSiteSearchKeywords` e exibir tabela.", "projeto_ado": "SETDIG", "csv_id_pai": 103, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": 3, "tags": "matomo,busca", "ado_id": ""}, {"csv_id": 106, "tipo": "Task", "titulo": "Mostrar jornada de navegacao (Transitions) da carta principal", "descricao": "Exibir jornada de entrada/saida da carta de servico principal via Matomo Transitions.\n\nSubatividades:\n- Implementar `Transitions.getTransitionsForPageUrl`.\n- Exibir diagrama de fluxo (entrada/saida) com Plotly.\n- Adicionar `@st.cache_data` para evitar timeout em `period=year`.", "projeto_ado": "SETDIG", "csv_id_pai": 103, "prioridade": 3, "sprint": "Sprint 2", "estimativa_horas": 11, "tags": "matomo,transitions,jornada", "ado_id": ""}, {"csv_id": 107, "tipo": "Task", "titulo": "Integrar dados GA4 para app MS Digital", "descricao": "Conectar GA4 Data API e criar painel MS Digital no app.\n\nSubatividades:\n- Conectar GA4 Data API em `ga4_client.py` (`activeUsers` + `screenPageViews`).\n- Criar painel MS Digital no `app.py` com filtro de periodo.", "projeto_ado": "SETDIG", "csv_id_pai": 103, "prioridade": 2, "sprint": "Sprint 1", "estimativa_horas": 10, "tags": "ga4,ms-digital", "ado_id": ""}, {"csv_id": 108, "tipo": "Task", "titulo": "Filtrar e rankear Cartas de Servico via regex nas URLs", "descricao": "Filtrar acessos a Cartas de Servico via regex e exibir ranking com comparativo mensal.\n\nSubatividades:\n- Definir regex pattern para Cartas de Servico em `data_processor.py`.\n- Exibir ranking de cartas com acessos e comparativo mensal.", "projeto_ado": "SETDIG", "csv_id_pai": 103, "prioridade": 2, "sprint": "Sprint 2", "estimativa_horas": 6, "tags": "cartas,ranking,regex", "ado_id": ""}, {"csv_id": 109, "tipo": "Product Backlog Item", "titulo": "Cruzamento e Higienizacao de Cartas de Servico (CGE-MS)", "descricao": "**Historia do usuario**\nComo gestor da CGE-MS, quero identificar cartas de servico duplicadas ou muito similares entre orgaos diferentes, para decidir quais unificar, mantendo a base limpa e padronizada.\n\n**Requisitos**\n- Extracao reprodutivel da base via Postgres (com VPN).\n- Score composto de similaridade em 8 campos: titulo 25%, descricao 20%, etapas 15%, requisitos 15%, publico 10%, nome popular 5%, palavra-chave 5%, tempo 5%.\n- Deteccao de duplicatas exatas + clusters de similares (threshold default 0.65).\n- Relatorio HTML standalone offline com KPIs, treemap, filtro por orgao e diff entre copias.\n\n**Criterios de Aceitacao**\n- Comando `run.bat --tudo` roda pipeline completo.\n- Relatorio `exports/relatorio.html` abre offline em Chrome/Edge.\n- Diff visual por cluster + pontuacao de qualidade do cadastro.\n- Aprovacao da CGE-MS sobre o formato.", "projeto_ado": "SETDIG", "csv_id_pai": 102, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": null, "tags": "cge,cruzamento,similaridade", "ado_id": ""}, {"csv_id": 110, "tipo": "Task", "titulo": "Detectar colunas HTML/entities (--probe-schema)", "descricao": "Varredura read-only da base para identificar colunas TEXT/VARCHAR com HTML/entities residuais.\n\nSubatividades:\n- Adicionar flag `--probe-schema` em `cli.py` que invoca rotina de deteccao e imprime tabela resumida.", "projeto_ado": "SETDIG", "csv_id_pai": 109, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": 4, "tags": "dba,probe-schema", "ado_id": ""}, {"csv_id": 111, "tipo": "Task", "titulo": "Snapshot completo das cartas ativas", "descricao": "Pipeline de extracao + limpeza + gravacao CSV. Base reprodutivel para todo o cruzamento.\n\nSubatividades:\n- Implementar `queries.py` com SELECT principal + JOIN `gerenciamento_jornada` para trazer etapas.\n- Implementar `extracao.py` orquestrando fetch + limpeza + gravacao CSV em `exports/`.\n- Implementar `db.py` carregando credenciais via `python-dotenv` (.env + VPN).\n- Implementar `normalize.py` (lowercase, sem acento, colapso de espacos, strip).\n- Implementar `html_clean.py` (strip HTML + decode entities `html.unescape` + regex).\n- Escrever `tests/test_smoke_db.py` + `tests/test_html_clean.py`.", "projeto_ado": "SETDIG", "csv_id_pai": 109, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": 16, "tags": "snapshot,extracao,postgres", "ado_id": ""}, {"csv_id": 112, "tipo": "Task", "titulo": "Detectar duplicatas exatas e similares", "descricao": "Computar score composto, agrupar em clusters e expor CLI configuravel.\n\nSubatividades:\n- Implementar `similaridade.py` com score composto dos 8 campos.\n- Implementar `clusters.py` (union-find sobre threshold + diff de cluster).\n- Expor flags `--threshold` e `--incluir-inativas` em `cli.py`.", "projeto_ado": "SETDIG", "csv_id_pai": 109, "prioridade": 2, "sprint": "Sprint 3", "estimativa_horas": 10, "tags": "similaridade,clusters", "ado_id": ""}, {"csv_id": 113, "tipo": "Task", "titulo": "Pontuacao de qualidade + cadastro modelo sugerido", "descricao": "Heuristica que pontua cada carta e sugere a melhor como modelo dentro do cluster.\n\nSubatividades:\n- Implementar heuristica (peso por campo preenchido + tamanho minimo descricao) e marcar cadastro de maior pontuacao como sugerido.", "projeto_ado": "SETDIG", "csv_id_pai": 109, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": 4, "tags": "qualidade,modelo", "ado_id": ""}, {"csv_id": 114, "tipo": "Task", "titulo": "Relatorio HTML offline (KPIs, treemap, diff)", "descricao": "Relatorio HTML standalone com 3 KPIs no topo, treemap, filtro/busca e diff por cluster.\n\nSubatividades:\n- Template `templates/relatorio.html.j2` com 3 KPIs + treemap interativo.\n- Filtro por orgao (select) + busca por titulo (input), client-side.\n- Bloco de diff visual por cluster (iguais colapsados, divergentes lado a lado).\n- Otimizacao CSS @media print para A4.", "projeto_ado": "SETDIG", "csv_id_pai": 109, "prioridade": 2, "sprint": "Sprint 4", "estimativa_horas": 12, "tags": "relatorio,html,kpi,treemap", "ado_id": ""}, {"csv_id": 115, "tipo": "Feature", "titulo": "2.4 Migração EDS → XVia", "descricao": "Documentação de governança para migração do ecossistema EDS (Control SSO, Admin, Atendimento, Integrador, FormFlow, CMS) para a plataforma XVia. Contrato de 180 dias de migração + 18 meses de operação. 36 serviços MS Digital a migrar + 10 novos autoatendimentos. 465.279+ usuário   const el = document.createElement("div");
  el.className = "wi-icon";
  el.style.cssText = `width:${size}px;height:${size}px;background:${ic.bg};border-radius:${size<=16?'3':'4'}px;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  el.innerHTML = ic.svg;
  return el;
}

function renderNode(node, depth) {
  const wrap = document.createElement("div");
  wrap.className = "node";

  const row = document.createElement("div");
  row.className = "node-row";
  row.style.paddingLeft = (8 + depth * INDENT_PX) + "px";
  row.dataset.id = node.csv_id;

  const toggle = document.createElement("span");
  toggle.className = "toggle" + (node.children.length ? "" : " leaf");
  toggle.innerHTML = "▶";

  const icon = wiIcon(node.tipo, 16);

  const title = document.createElement("span");
  title.className = "title-text";
  title.textContent = node.titulo;

  row.appendChild(toggle);
  row.appendChild(icon);
  row.appendChild(title);

  // children
  const childWrap = document.createElement("div");
  childWrap.className = "children-wrap";
  childWrap.style.setProperty("--guide-x", (16 + depth * INDENT_PX) + "px");

  const childrenDiv = document.createElement("div");
  childrenDiv.className = "children";
  node.children.forEach(c => childrenDiv.appendChild(renderNode(c, depth + 1)));
  childWrap.appendChild(childrenDiv);

  row.addEventListener("click", e => {
    e.stopPropagation();
    if (node.children.length) {
      const open = childrenDiv.classList.toggle("open");
      toggle.classList.toggle("open", open);
    }
    document.querySelectorAll(".node-row.selected").forEach(r => r.classList.remove("selected"));
    row.classList.add("selected");
    renderDetail(node);
  });

  wrap.appendChild(row);
  wrap.appendChild(childWrap);
  return wrap;
}

function copy(text, btn) {
  (navigator.clipboard?.writeText(text) || Promise.reject())
    .then(() => flash(btn))
    .catch(() => {
      const ta = Object.assign(document.createElement("textarea"), { value: text });
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      flash(btn);
    });
}
function flash(btn) {
  const t = btn.textContent;
  btn.textContent = "✓ Copiado"; btn.classList.add("ok");
  setTimeout(() => { btn.textContent = t; btn.classList.remove("ok"); }, 1400);
}

function field(label, value, cls = "") {
  const w = document.createElement("div"); w.className = "field";
  const top = document.createElement("div"); top.className = "field-top";
  const lbl = document.createElement("span"); lbl.className = "field-label"; lbl.textContent = label;
  const btn = document.createElement("button"); btn.className = "copy-btn"; btn.textContent = "Copiar";
  btn.addEventListener("click", () => copy(value || "", btn));
  top.appendChild(lbl); top.appendChild(btn);
  const val = document.createElement("div");
  val.className = "field-value" + (cls ? " "+cls : "") + (value ? "" : " empty-v");
  val.textContent = value || "(sem preenchimento)";
  w.appendChild(top); w.appendChild(val);
  return w;
}

function renderDetail(node) {
  const panel = document.getElementById("detail");
  panel.innerHTML = "";

  const ic = ICONS[node.tipo] || ICONS["Task"];

  // header bar
  const hdr = document.createElement("div"); hdr.className = "det-header";
  const bigIcon = wiIcon(node.tipo, 24); bigIcon.className = "det-wi-icon";
  bigIcon.style.cssText = `width:24px;height:24px;background:${ic.bg};border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0`;
  const typeLabel = document.createElement("span"); typeLabel.className = "det-type-label";
  typeLabel.style.color = ic.bg; typeLabel.textContent = LABEL[node.tipo] || node.tipo;
  const sep = document.createElement("div"); sep.className = "det-sep";
  const idEl = document.createElement("span"); idEl.className = "det-id";
  idEl.textContent = node.ado_id ? `#${node.ado_id}` : `CSV-${node.csv_id}`;
  hdr.appendChild(bigIcon); hdr.appendChild(typeLabel);
  hdr.appendChild(sep); hdr.appendChild(idEl);
  panel.appendChild(hdr);

  // body
  const body = document.createElement("div"); body.className = "det-body";
  const titleEl = document.createElement("div"); titleEl.className = "det-title";
  titleEl.textContent = node.titulo;
  body.appendChild(titleEl);
  body.appendChild(field("Título", node.titulo, "title-v"));
  body.appendChild(field("Descrição", node.descricao));
  panel.appendChild(body);
}

const treeEl = document.getElementById("tree");
roots.forEach(r => treeEl.appendChild(renderNode(r, 0)));

document.querySelectorAll(".node-row[data-id]").forEach(row => {
  const n = map[parseInt(row.dataset.id)];
  if (n?.tipo === "Epic" && n.children.length) row.click();
});
</script>
</body>
</html>
